<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>SIT Paris '26 — Landing Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Kalam:wght@300;400;700&family=Architects+Daughter&family=Patrick+Hand&family=Space+Mono:wght@400;700&family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: 'Patrick Hand', system-ui, sans-serif; }
  .sketchy * { -webkit-font-smoothing: antialiased; }
  .sketchy h1, .sketchy h2, .sketchy h3 {
    font-family: 'Kalam', 'Patrick Hand', cursive !important;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wireframes.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "sit-paris",
  "vibe": "balanced",
  "density": "compact",
  "typeStyle": "modern"
}/*EDITMODE-END*/;

// Palettes — bleu SAP retravaillé en plusieurs variations
const PALETTES = {
  "sit-paris": {
    name: "SIT Paris (logo)",
    paperBright: "#fbfaf6",
    paper: "#f3eedf",
    ink: "#1a4b8c",
    muted: "#6b7a92",
    stripe: "#e8e0c8",
    accent: "#f0a020",
    accentSoft: "#fde8b8",
  },
  "sap-blue": {
    name: "SAP Blue refined",
    paperBright: "#fbfaf6",
    paper: "#f4f1ea",
    ink: "#0a2540",
    muted: "#5a6b80",
    stripe: "#e8e3d8",
    accent: "#0070f3",
    accentSoft: "#dceaff",
  },
  "deep-night": {
    name: "Deep night",
    paperBright: "#0d1626",
    paper: "#16243a",
    ink: "#e8edf5",
    muted: "#7a8aa3",
    stripe: "#1c2c45",
    accent: "#3b9aff",
    accentSoft: "#1f3a5e",
  },
  "cream-cobalt": {
    name: "Cream & cobalt",
    paperBright: "#faf6ed",
    paper: "#f1ead7",
    ink: "#1a1a1a",
    muted: "#6b6358",
    stripe: "#e8dfc6",
    accent: "#1e3a8a",
    accentSoft: "#dbe5ff",
  },
  "electric": {
    name: "Electric",
    paperBright: "#ffffff",
    paper: "#f5f5f7",
    ink: "#000000",
    muted: "#666",
    stripe: "#ececec",
    accent: "#0049ff",
    accentSoft: "#cfdcff",
  },
};

const TYPE_STYLES = {
  modern: {
    sans: "'Inter', system-ui, sans-serif",
    serif: "'Fraunces', Georgia, serif",
    mono: "'Space Mono', ui-monospace, monospace",
  },
  sketchy: {
    sans: "'Patrick Hand', cursive",
    serif: "'Kalam', cursive",
    mono: "'Space Mono', monospace",
  },
  editorial: {
    sans: "'Fraunces', Georgia, serif",
    serif: "'Fraunces', Georgia, serif",
    mono: "'Space Mono', monospace",
  },
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const palette = PALETTES[t.palette] || PALETTES["sap-blue"];
  const typeS = TYPE_STYLES[t.typeStyle] || TYPE_STYLES.modern;

  // make theme available to wireframes via window
  window.__wfTheme = { ...palette, ...typeS };

  // density scale via CSS var (artboards use fixed sizes; we scale via root font-size)
  const densityMul = t.density === "compact" ? 0.92 : t.density === "comfy" ? 1.08 : 1;

  // sketchy class adds handwritten headings
  const isSketchy = t.vibe === "sketchy";

  // re-render trigger when theme changes — design-canvas children read from window
  // so we force re-mount via key
  const themeKey = `${t.palette}-${t.typeStyle}-${t.vibe}-${t.density}`;

  return (
    <div className={isSketchy ? "sketchy" : ""}>
      <DesignCanvas key={themeKey}>
        <DCSection
          id="intro"
          title="SAP Inside Track Paris '26 — Wireframes"
          subtitle="4 directions — 25.09.2026 · SAP France · 80 pax · 4 tracks · première édition FR"
        >
          <DCArtboard id="w1" label="01 · Terminal / Dev-conf" width={1280} height={2400}>
            <div style={{ fontSize: 16 * densityMul, height: "100%" }}>
              <Wireframe1 />
            </div>
          </DCArtboard>

          <DCArtboard id="w2" label="02 · Magazine éditorial" width={1280} height={2600}>
            <div style={{ fontSize: 16 * densityMul, height: "100%" }}>
              <Wireframe2 />
            </div>
          </DCArtboard>

          <DCArtboard id="w3" label="03 · Bold typographique" width={1280} height={2800}>
            <div style={{ fontSize: 16 * densityMul, height: "100%" }}>
              <Wireframe3 />
            </div>
          </DCArtboard>

          <DCArtboard id="w4" label="04 · Schedule grid first" width={1280} height={2400}>
            <div style={{ fontSize: 16 * densityMul, height: "100%" }}>
              <Wireframe4 />
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Palette" />
        <TweakSelect
          label="Couleurs"
          value={t.palette}
          options={[
            { value: "sit-paris", label: "SIT Paris (logo)" },
            { value: "sap-blue", label: "SAP Blue refined" },
            { value: "deep-night", label: "Deep night (dark)" },
            { value: "cream-cobalt", label: "Cream & cobalt" },
            { value: "electric", label: "Electric" },
          ]}
          onChange={(v) => setTweak("palette", v)}
        />

        <TweakSection label="Typographie" />
        <TweakRadio
          label="Style"
          value={t.typeStyle}
          options={[
            { value: "modern", label: "Modern" },
            { value: "sketchy", label: "Sketchy" },
            { value: "editorial", label: "Editorial" },
          ]}
          onChange={(v) => setTweak("typeStyle", v)}
        />

        <TweakSection label="Vibe" />
        <TweakRadio
          label="Sketchy ↔ Propre"
          value={t.vibe}
          options={[
            { value: "balanced", label: "Balanced" },
            { value: "sketchy", label: "Sketchy" },
          ]}
          onChange={(v) => setTweak("vibe", v)}
        />

        <TweakSection label="Densité" />
        <TweakRadio
          label="Densité"
          value={t.density}
          options={[
            { value: "compact", label: "Compact" },
            { value: "regular", label: "Regular" },
            { value: "comfy", label: "Comfy" },
          ]}
          onChange={(v) => setTweak("density", v)}
        />
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
